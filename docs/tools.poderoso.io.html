document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

justify-content:center;width:28px;height:28px;background:transparent;border:1px solid #44475a;border-radius:6px;cursor:pointer;color:#6272a4;padding:0;\" style-hover=\"border-color:#bd93f9;color:#f8f8f2;\"><sc-if value=\"{{ notCopiedJwtP }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect width=\"14\" height=\"14\" x=\"8\" y=\"8\" rx=\"2\" ry=\"2\"><\u002Frect><path d=\"M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2\"><\u002Fpath><\u002Fsvg><\u002Fsc-if><sc-if value=\"{{ copiedJwtP }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#50fa7b\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 15 4 10\"><\u002Fpolyline><\u002Fsvg><\u002Fsc-if><\u002Fbutton>\n              <\u002Fdiv>\n              <pre style=\"background:#191a21;border:1px solid #343746;border-radius:10px;padding:14px;font-size:12px;line-height:1.65;color:#8be9fd;overflow:auto;margin:0;min-height:180px;white-space:pre-wrap;word-break:break-word;\">{{ jwt_payload }}<\u002Fpre>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- TEXT DIFF -->\n    <sc-if value=\"{{ isDiff }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"flex:1;overflow-y:auto;padding:28px 36px;display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:11px;\"><span style=\"color:#50fa7b;\">~/diff/text<\u002Fspan><span style=\"color:#44475a;\">—<\u002Fspan><span style=\"color:#6272a4;\">compara dois textos linha por linha<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <div style=\"font-size:9.5px;color:#6272a4;letter-spacing:0.12em;text-transform:uppercase;\">// texto original<\u002Fdiv>\n          <textarea value=\"{{ diff_left }}\" onchange=\"{{ onDiffLeft }}\" placeholder=\"Texto original...\" style=\"width:100%;background:#191a21;border:1px solid #343746;border-radius:10px;padding:14px;font-size:12px;line-height:1.65;color:#f8f8f2;min-height:180px;\" style-focus=\"border-color:#ff5555;\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <div style=\"font-size:9.5px;color:#6272a4;letter-spacing:0.12em;text-transform:uppercase;\">// texto modificado<\u002Fdiv>\n          <textarea value=\"{{ diff_right }}\" onchange=\"{{ onDiffRight }}\" placeholder=\"Texto modificado...\" style=\"width:100%;background:#191a21;border:1px solid #343746;border-radius:10px;padding:14px;font-size:12px;line-height:1.65;color:#f8f8f2;min-height:180px;\" style-focus=\"border-color:#50fa7b;\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <button onclick=\"{{ runDiff }}\" style=\"background:#50fa7b;color:#21222c;border:none;border-radius:8px;padding:9px 22px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;\" style-hover=\"background:#69ff94;\">Comparar →<\u002Fbutton>\n        <sc-if value=\"{{ hasDiff }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"font-size:11px;color:#6272a4;\">{{ diffSummary }}<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <sc-if value=\"{{ hasDiff }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#191a21;border:1px solid #343746;border-radius:10px;overflow:hidden;\">\n          <div style=\"padding:8px 14px;border-bottom:1px solid #343746;font-size:9.5px;color:#6272a4;letter-spacing:0.12em;text-transform:uppercase;\">// resultado<\u002Fdiv>\n          <div style=\"overflow-y:auto;max-height:360px;padding:6px 0;\">\n            <sc-for list=\"{{ diff_lines }}\" as=\"dl\" hint-placeholder-count=\"0\">\n              <div style=\"display:flex;background:{{ dl.bg }};border-left:2px solid {{ dl.border }};\">\n                <span style=\"font-size:11px;color:{{ dl.pc }};user-select:none;width:28px;flex-shrink:0;text-align:right;padding:1px 8px 1px 0;line-height:1.75;\">{{ dl.prefix }}<\u002Fspan>\n                <span style=\"font-size:12px;color:{{ dl.tc }};white-space:pre;padding:1px 12px;line-height:1.75;font-family:'IBM Plex Mono',monospace;\">{{ dl.text }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    tool: 'json',\n    json_in: '{\\n  \"nome\": \"Thiago Poderoso\",\\n  \"role\": \"Tech Leader\",\\n  \"stack\": [\"C#\", \"Node.js\", \".NET\"],\\n  \"anos\": 18\\n}',\n    json_out: '',\n    xml_in: '<developer>\\n  <nome>Thiago Poderoso<\u002Fnome>\\n  <stack><item>C#<\u002Fitem><item>Node.js<\u002Fitem><\u002Fstack>\\n<\u002Fdeveloper>',\n    xml_out: '',\n    sql_in: 'select u.id, u.nome, p.titulo from usuarios u inner join perfis p on p.id = u.perfil_id where u.ativo = 1 order by u.nome',\n    sql_out: '',\n    cpf_out: '', cnpj_out: '', uuid_out: '',\n    pwd_out: '', pwd_len: 16, pwd_sym: false, pwd_upper: true, pwd_num: true,\n    lorem_count: 3, lorem_out: '',\n    qr_in: 'https://poderoso.io', qr_committed: '',\n    curl_in: \"curl -X POST 'https://api.exemplo.com/v1/users' \\\\\\n  -H 'Authorization: Bearer SEU_TOKEN' \\\\\\n  -H 'Content-Type: application/json' \\\\\\n  -d '{\\\"nome\\\": \\\"Thiago\\\", \\\"role\\\": \\\"admin\\\"}'\",\n    curl_out: '',\n    b64_mode: 'encode', b64_in: '',\n    b64img_src: '', b64img_b64: '', b64img_name: '',\n    jwt_in: '',\n    diff_left: '', diff_right: '', diff_lines: null,\n    copiedKey: '',\n  };\n\n  componentDidMount() {\n    const s = this.state;\n    this.setState({\n      cpf_out: this.genCPF(),\n      cnpj_out: this.genCNPJ(),\n      uuid_out: this.genUUID(),\n      pwd_out: this.genPassword(s.pwd_len, s.pwd_sym, s.pwd_upper, s.pwd_num),\n      lorem_out: this.loremText(s.lorem_count),\n      json_out: this.fmtJSON(s.json_in),\n      curl_out: this.parseCurl(s.curl_in),\n    });\n  }\n\n  rnd(n) { return Math.floor(Math.random() * n); }\n\n  genCPF() {\n    const n = Array.from({ length: 9 }, () => this.rnd(10));\n    const dv = (arr) => { let f = arr.length + 1, s = arr.reduce((a, d) => a + d * (f--), 0), r = (s * 10) % 11; return r >= 10 ? 0 : r; };\n    const d1 = dv(n), d2 = dv([...n, d1]);\n    return [...n, d1, d2].join('').replace(/(\\d{3})(\\d{3})(\\d{3})(\\d{2})/, '$1.$2.$3-$4');\n  }\n\n  genCNPJ() {\n    const b = [...Array(8)].map(() => this.rnd(10)).concat([0, 0, 0, 1]);\n    const calc = (arr) => { const w = arr.length === 12 ? [5,4,3,2,9,8,7,6,5,4,3,2] : [6,5,4,3,2,9,8,7,6,5,4,3,2]; const s = arr.reduce((a,d,i) => a+d*w[i],0), r = s%11; return r<2?0:11-r; };\n    const d1 = calc(b), d2 = calc([...b, d1]);\n    return [...b, d1, d2].join('').replace(/(\\d{2})(\\d{3})(\\d{3})(\\d{4})(\\d{2})/, '$1.$2.$3/$4-$5');\n  }\n\n  genUUID() {\n    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {\n      const r = Math.random() * 16 | 0;\n      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);\n    });\n  }\n\n  genPassword(len, sym, upper, num) {\n    const lower = 'abcdefghijklmnopqrstuvwxyz';\n    const uppers = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';\n    const nums = '0123456789';\n    const syms = '!@#$%^&*()-_=+[]{}|;:,.?';\n    let chars = lower;\n    if (upper) chars += uppers;\n    if (num) chars += nums;\n    if (sym) chars += syms;\n    if (!chars) chars = lower;\n    let pwd = '';\n    for (let i = 0; i < len; i++) pwd += chars[this.rnd(chars.length)];\n    retu
